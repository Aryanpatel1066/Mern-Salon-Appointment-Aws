version: "3.9"

services:
  backend:
    image: aryanpatel1066/salon-backend:latest
    container_name: salon-backend
    ports:
      - "1066:1066"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    image: aryanpatel1066/salon-frontend:latest
    container_name: salon-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped